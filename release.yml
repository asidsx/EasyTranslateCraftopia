name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Рекомендую 3.11 для PyQt6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          # --noconsole - убирает окно консоли
          # --onefile - собирает все в один .exe
          # --name - имя итогового файла
          pyinstaller --noconsole --onefile --name EasyTranslateCraftopia main.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/EasyTranslateCraftopia.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}